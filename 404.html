<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Curtain's Down | AARSHI</title>
  <link rel="icon" href="assets/favicon.ico"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--black:#0D0D0D;--dark:#141414;--gold:#E8C547;--gold-dim:#B8952D;--red:#C0392B;--red-dark:#922B21;--parchment:#F5F0E8;--muted:#9A9A8A;--font-display:'Playfair Display',Georgia,serif;--font-body:'Inter',system-ui,sans-serif}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--black);color:var(--parchment);font-family:var(--font-body);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
    .bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(232,197,71,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(232,197,71,0.04) 1px,transparent 1px);background-size:60px 60px}
    .curtain-l,.curtain-r{position:fixed;top:0;width:18%;height:100%;background:repeating-linear-gradient(90deg,var(--red-dark) 0px,#7B241C 18px,var(--red-dark) 36px);z-index:1}
    .curtain-l{left:0}
    .curtain-r{right:0}
    .content{position:relative;z-index:2;text-align:center;padding:2rem;max-width:480px}
    .big-404{font-family:var(--font-display);font-size:clamp(4rem,15vw,7rem);font-weight:900;font-style:italic;color:var(--gold);line-height:1;margin-bottom:1rem;text-shadow:0 0 40px rgba(232,197,71,0.25)}
    h1{font-family:var(--font-display);font-size:1.5rem;color:#fff;margin-bottom:0.75rem}
    p{color:var(--muted);font-size:0.95rem;line-height:1.7;margin-bottom:2rem}
    .btn{display:inline-flex;align-items:center;gap:0.5rem;padding:0.75rem 1.75rem;background:var(--gold);color:var(--black);border-radius:6px;font-weight:700;font-size:0.9rem;text-decoration:none;transition:background 0.2s,transform 0.2s}
    .btn:hover{background:var(--gold-dim);transform:translateY(-2px)}
    .mask{font-size:2.5rem;margin-bottom:1rem;opacity:0.7}
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="curtain-l"></div>
  <div class="curtain-r"></div>
  <div class="content">
    <div class="mask">🎭</div>
    <div class="big-404">404</div>
    <h1>The page you're looking for has left the stage.</h1>
    <p>Perhaps it took a bow too early, or maybe it never made it to the script. Either way, let's get you back to where the show is happening.</p>
    <a href="/" class="btn">← Back to AARSHI</a>
  </div>
</body>
</html>
