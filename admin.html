<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AARSHI — Admin Panel</title>
  <link rel="icon" href="assets/favicon.ico"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--black:#0D0D0D;--dark:#141414;--dark-2:#1C1C1C;--gold:#E8C547;--gold-dim:#B8952D;--red:#C0392B;--green:#2ECC71;--parchment:#F5F0E8;--muted:#9A9A8A;--white:#FFFFFF;--font-display:'Playfair Display',Georgia,serif;--font-body:'Inter',system-ui,sans-serif}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--black);color:var(--parchment);font-family:var(--font-body);min-height:100vh}
    a{color:inherit;text-decoration:none}

    .loading{position:fixed;inset:0;background:var(--black);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem}
    .loading.gone{display:none}
    .loading-logo{font-family:var(--font-display);font-size:2rem;font-style:italic;color:var(--gold)}
    .spinner{width:32px;height:32px;border:3px solid rgba(232,197,71,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    .denied{position:fixed;inset:0;background:var(--black);display:none;align-items:center;justify-content:center;flex-direction:column;gap:1rem;text-align:center;padding:2rem}
    .denied.show{display:flex}
    .denied-icon{font-size:3rem}
    .denied h2{font-family:var(--font-display);font-size:1.5rem;color:var(--white)}
    .denied p{color:var(--muted);font-size:0.9rem;max-width:360px}
    .denied a{color:var(--gold);text-decoration:underline}

    header{background:rgba(20,20,20,0.95);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,0.06);padding:0 2rem;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .logo{font-family:var(--font-display);font-size:1.2rem;font-style:italic;color:var(--gold)}
    .hdr-right{display:flex;align-items:center;gap:0.75rem}
    .hdr-name{font-size:0.85rem;font-weight:600}
    .back-site{font-size:0.78rem;color:var(--muted);transition:color 0.2s}
    .back-site:hover{color:var(--gold)}
    .logout-btn{font-size:0.78rem;color:var(--muted);cursor:pointer;padding:0.35rem 0.75rem;border:1px solid rgba(255,255,255,0.1);border-radius:6px;background:none;transition:all 0.2s}
    .logout-btn:hover{border-color:var(--red);color:var(--red)}

    .wrap{max-width:900px;margin:0 auto;padding:2.5rem 1.5rem}
    .page-title{font-family:var(--font-display);font-size:1.8rem;color:var(--white);margin-bottom:0.3rem}
    .page-sub{color:var(--muted);font-size:0.88rem;margin-bottom:2rem}

    .tabs{display:flex;gap:0.5rem;margin-bottom:1.5rem;flex-wrap:wrap}
    .tab-btn{padding:0.5rem 1.1rem;font-size:0.82rem;font-weight:600;border-radius:6px;border:1.5px solid rgba(255,255,255,0.1);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:0.4rem}
    .tab-btn:hover{border-color:var(--gold);color:var(--gold)}
    .tab-btn.active{background:var(--gold);border-color:var(--gold);color:var(--black)}
    .tab-count{background:rgba(0,0,0,0.2);padding:0.05rem 0.45rem;border-radius:10px;font-size:0.72rem}
    .tab-btn.active .tab-count{background:rgba(0,0,0,0.25)}
    .tab-btn:not(.active) .tab-count{background:rgba(255,255,255,0.08)}

    .request-card{background:var(--dark);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:0.85rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;animation:fadeIn 0.3s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
    .req-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--dark-2),var(--black));border:2px solid rgba(232,197,71,0.3);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;color:var(--gold);flex-shrink:0}
    .req-info{flex:1;min-width:180px}
    .req-name{font-weight:600;font-size:0.95rem;color:var(--white)}
    .req-email{font-size:0.78rem;color:var(--muted);margin-top:0.1rem}
    .req-meta{display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.45rem}
    .req-meta span{font-size:0.68rem;padding:0.18rem 0.55rem;border-radius:4px;background:rgba(232,197,71,0.08);border:1px solid rgba(232,197,71,0.18);color:var(--gold)}
    .req-actions{display:flex;gap:0.5rem;flex-shrink:0}
    .btn-approve,.btn-reject,.btn-undo{padding:0.5rem 1rem;border-radius:6px;font-size:0.8rem;font-weight:600;cursor:pointer;border:none;transition:all 0.2s;white-space:nowrap}
    .btn-approve{background:var(--green);color:#fff}
    .btn-approve:hover{background:#27AE60}
    .btn-reject{background:transparent;border:1.5px solid rgba(231,76,60,0.4);color:#E74C3C}
    .btn-reject:hover{background:rgba(231,76,60,0.1)}
    .btn-undo{background:transparent;border:1.5px solid rgba(232,197,71,0.4);color:var(--gold)}
    .btn-undo:hover{background:rgba(232,197,71,0.1)}
    .status-pill{font-size:0.7rem;font-weight:700;padding:0.25rem 0.7rem;border-radius:5px}
    .status-pill.approved{background:rgba(46,204,113,0.15);color:var(--green)}
    .status-pill.rejected{background:rgba(231,76,60,0.15);color:#E74C3C}

    .empty{text-align:center;padding:3.5rem 2rem;color:var(--muted)}
    .empty-icon{font-size:2.5rem;margin-bottom:0.85rem}
    .empty p{font-size:0.88rem;line-height:1.6}

    .search-wrap{position:relative;margin-bottom:1.25rem}
    .search-wrap input{width:100%;padding:0.7rem 1rem 0.7rem 2.6rem;background:var(--dark);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:var(--parchment);font-size:0.88rem;outline:none}
    .search-wrap input:focus{border-color:var(--gold)}
    .search-icon{position:absolute;left:0.85rem;top:50%;transform:translateY(-50%);color:var(--muted)}

    @media(max-width:600px){.req-actions{width:100%;justify-content:flex-end}}
  </style>
</head>
<body>

  <div class="loading" id="loading">
    <div class="loading-logo">AARSHI</div>
    <div class="spinner"></div>
  </div>

  <div class="denied" id="denied">
    <div class="denied-icon">🚫</div>
    <h2>Admin Access Only</h2>
    <p>This page is restricted to AARSHI admins. If you believe this is a mistake, contact <a href="mailto:aarshi@iiserkol.ac.in">aarshi@iiserkol.ac.in</a>.</p>
    <p><a href="index.html">← Back to site</a></p>
  </div>

  <div id="adminContent" style="display:none">
    <header>
      <a href="index.html" class="logo">AARSHI</a>
      <div class="hdr-right">
        <a href="index.html" class="back-site">← Site</a>
        <span class="hdr-name" id="hdrName"></span>
        <button class="logout-btn" onclick="auth.signOut().then(()=>location.href='auth.html')">Logout</button>
      </div>
    </header>

    <div class="wrap">
      <h1 class="page-title">🛡 Admin Panel</h1>
      <p class="page-sub">Review and manage member account requests</p>

      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Search by name or email…" oninput="renderList()"/>
      </div>

      <div class="tabs">
        <button class="tab-btn active" data-tab="pending" onclick="setTab(this)">⏳ Pending <span class="tab-count" id="countPending">0</span></button>
        <button class="tab-btn" data-tab="approved" onclick="setTab(this)">✅ Approved <span class="tab-count" id="countApproved">0</span></button>
        <button class="tab-btn" data-tab="rejected" onclick="setTab(this)">❌ Rejected <span class="tab-count" id="countRejected">0</span></button>
      </div>

      <div id="listContainer"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey:"AIzaSyCiIPpWPw68y5dEdt1LaeNtxVuCFGBISuU",
      authDomain:"aarshi-iiserk.firebaseapp.com",
      projectId:"aarshi-iiserk",
      storageBucket:"aarshi-iiserk.firebasestorage.app",
      messagingSenderId:"195490022156",
      appId:"1:195490022156:web:70066f5b5a3bc79aff7f29"
    });
    const auth = firebase.auth();
    const db   = firebase.firestore();

    let allMembers = [];
    let activeTab  = "pending";

    auth.onAuthStateChanged(async user => {
      if (!user) { window.location.href = "auth.html"; return; }

      const selfSnap = await db.collection("members").doc(user.uid).get();
      const self = selfSnap.exists ? selfSnap.data() : {};

      document.getElementById("loading").classList.add("gone");

      if (self.role !== "admin") {
        document.getElementById("denied").classList.add("show");
        return;
      }

      document.getElementById("hdrName").textContent = self.name || user.email;
      document.getElementById("adminContent").style.display = "block";
      loadMembers();
    });

    async function loadMembers() {
      const snap = await db.collection("members").get();
      allMembers = snap.docs.map(doc => {
        const d = doc.data();
        return {
          uid: doc.id,
          name: d.name || "Unknown",
          email: d.email || "–",
          yearJoined: d.yearJoined || "–",
          yearLeft: d.yearLeft || "Present",
          interests: d.interests || [],
          // Accounts created before this feature has no status field — treat as approved
          status: d.status || "approved",
          role: d.role || "member"
        };
      }).sort((a,b) => a.name.localeCompare(b.name));
      renderList();
    }

    function getInitials(name) {
      return (name||"?").split(" ").map(w=>w[0]||"").join("").slice(0,2).toUpperCase();
    }

    function setTab(btn) {
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      activeTab = btn.dataset.tab;
      renderList();
    }
    window.setTab = setTab;

    function renderList() {
      const q = document.getElementById("searchInput").value.trim().toLowerCase();

      document.getElementById("countPending").textContent  = allMembers.filter(m=>m.status==="pending").length;
      document.getElementById("countApproved").textContent = allMembers.filter(m=>m.status==="approved").length;
      document.getElementById("countRejected").textContent = allMembers.filter(m=>m.status==="rejected").length;

      const filtered = allMembers.filter(m => {
        const matchesTab = m.status === activeTab;
        const matchesQ = !q || m.name.toLowerCase().includes(q) || m.email.toLowerCase().includes(q);
        return matchesTab && matchesQ;
      });

      const container = document.getElementById("listContainer");

      if (!filtered.length) {
        const emptyMsgs = {
          pending:  "No pending requests. New signups will appear here for review.",
          approved: "No approved members match your search.",
          rejected: "No rejected accounts."
        };
        container.innerHTML = `<div class="empty">
          <div class="empty-icon">${activeTab==="pending"?"🎭":activeTab==="approved"?"✅":"❌"}</div>
          <p>${emptyMsgs[activeTab]}</p>
        </div>`;
        return;
      }

      container.innerHTML = filtered.map(m => {
        const chips = m.interests.slice(0,3).map(i => `<span>${i}</span>`).join("");
        let actions = "";
        if (m.status === "pending") {
          actions = `
            <button class="btn-approve" onclick="setStatus('${m.uid}','approved')">✓ Approve</button>
            <button class="btn-reject" onclick="setStatus('${m.uid}','rejected')">✕ Reject</button>`;
        } else if (m.status === "approved") {
          actions = `<span class="status-pill approved">✓ Approved</span>
            <button class="btn-undo" onclick="setStatus('${m.uid}','pending')">Revert</button>`;
        } else if (m.status === "rejected") {
          actions = `<span class="status-pill rejected">✕ Rejected</span>
            <button class="btn-undo" onclick="setStatus('${m.uid}','pending')">Revert</button>`;
        }
        return `<div class="request-card" id="card-${m.uid}">
          <div class="req-avatar">${getInitials(m.name)}</div>
          <div class="req-info">
            <div class="req-name">${escHtml(m.name)} ${m.role==='admin' ? ' 🛡' : ''}</div>
            <div class="req-email">${escHtml(m.email)}</div>
            <div class="req-meta">
              <span>Joined ${m.yearJoined}</span>
              ${chips}
            </div>
          </div>
          <div class="req-actions">${actions}</div>
        </div>`;
      }).join("");
    }
    window.renderList = renderList;

    function escHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    async function setStatus(uid, status) {
      const card = document.getElementById("card-" + uid);
      if (card) card.style.opacity = "0.5";
      try {
        await db.collection("members").doc(uid).update({ status });
        const m = allMembers.find(x => x.uid === uid);
        if (m) m.status = status;
        renderList();
      } catch(e) {
        alert("Failed to update status: " + e.message);
        if (card) card.style.opacity = "1";
      }
    }
    window.setStatus = setStatus;
  </script>
</body>
</html>
