<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AARSHI Signup</title>

<style>
body{
background:#0d0d0d;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#1c1c1c;
padding:30px;
border-radius:15px;
width:400px;
}

input{
width:95%;
padding:10px;
margin:8px 0;
border:none;
border-radius:8px;
}

button{
background:#e8c547;
padding:10px;
width:100%;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">

<h2>AARSHI Member Registration</h2>

<input id="name" placeholder="Name">

<input id="position" placeholder="Position (Director, Light, Sound etc.)">

<input id="attendance" placeholder="Attendance %">

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button onclick="signup()">Create Account</button>

</div>

</body>
</html>
