<!DOCTYPE html>
<html>
<head>
<title>AARSHI Dashboard</title>

<style>
body{
background:#0d0d0d;
color:white;
font-family:Arial;
padding:40px;
}

.card{
background:#1c1c1c;
padding:25px;
border-radius:15px;
max-width:700px;
margin:auto;
}

h1{
color:#e8c547;
}
</style>
</head>
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";

import { getAuth, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/11.9.1/firebase-auth.js";

import { getDatabase, ref, get }
from "https://www.gstatic.com/firebasejs/11.9.1/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyBEwJ8H_QYK_6CeYOA7UTJliynkv5wD_9w",

authDomain: "aarshi-3ce95.firebaseapp.com",

databaseURL:
"https://aarshi-3ce95-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId: "aarshi-3ce95",

storageBucket: "aarshi-3ce95.firebasestorage.app",

messagingSenderId: "267278913707",

appId:
"1:267278913707:web:3b3379b43b3486453627ee"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const database = getDatabase(app);

onAuthStateChanged(auth, (user)=>{

if(user){

get(
ref(database,"members/"+user.uid)
)

.then((snapshot)=>{

const data = snapshot.val();

document.getElementById("welcome")
.innerHTML =
"Welcome, " + data.name;

document.getElementById("attendance")
.innerHTML =
data.attendance;

document.getElementById("achievements")
.innerHTML =
data.approvedAchievements || "No approved achievements yet";

document.getElementById("departments")
.innerHTML =
data.departments ?
data.departments.join(", ")
:
"None";

document.getElementById("yearJoined")
.innerHTML =
data.yearJoined;

});

}

else{

window.location.href =
"login.html";

}

});

</script>
<body>

<div class="card">

<h1 id="welcome">Welcome</h1>

<h3>Attendance</h3>
<p id="attendance">Loading...</p>

<h3>Approved Achievements</h3>
<p id="achievements">Loading...</p>

<h3>Departments</h3>
<p id="departments">Loading...</p>

<h3>Year Joined</h3>
<p id="yearJoined">Loading...</p>

</div>

</body>
</html>
