<!DOCTYPE html>
<html>
<head>
    <title>AARSHI Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body{
            background:#0d0d0d;
            color:white;
            font-family:Arial,sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .box{
            background:#1a1a1a;
            padding:30px;
            border-radius:15px;
            width:350px;
            text-align:center;
        }

        h1{
            color:#e8c547;
        }

        input{
            width:90%;
            padding:12px;
            margin:10px;
            border:none;
            border-radius:8px;
        }

        button{
            background:#e8c547;
            border:none;
            padding:12px 20px;
            border-radius:8px;
            cursor:pointer;
            font-weight:bold;
        }

        a{
            color:#e8c547;
        }
    </style>
</head>

<body>

<div class="box">
    <h1>AARSHI</h1>
    <h3>Member Login</h3>

    <input type="email" id="email" placeholder="Email">

    <input type="password" id="password" placeholder="Password">
<p id="test"></p>
    <button onclick="login()">Login</button>

    <p>
        New Member?
        <a href="signup.html">Sign Up</a>
    </p>
</div>

<script>
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/11.9.1/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyBEwJ8H_QYK_6CeYOA7UTJliynkv5wD_9w",

authDomain: "aarshi-3ce95.firebaseapp.com",

databaseURL:
"https://aarshi-3ce95-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId: "aarshi-3ce95",

storageBucket: "aarshi-3ce95.firebasestorage.app",

messagingSenderId: "267278913707",

appId:
"1:267278913707:web:3b3379b43b3486453627ee"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

window.login = function(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

signInWithEmailAndPassword(
auth,
email,
password
)

.then((userCredential)=>{

alert("Login Successful");

window.location.href =
"dashboard.html";

})

.catch((error)=>{

alert(error.message);

});

}

</script>
</script>

</body>
</html>
